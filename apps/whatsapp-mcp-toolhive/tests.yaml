---
# yaml-language-server: $schema=https://raw.githubusercontent.com/GoogleContainerTools/container-structure-test/master/schema.json
schemaVersion: "2.0.0"
metadataTest:
  entrypoint:
    - /opt/whatsapp-mcp/mcp-entrypoint.sh
fileExistenceTests:
  - name: WhatsApp bridge binary
    path: /opt/whatsapp-mcp/whatsapp-bridge/whatsapp-bridge
    shouldExist: true
    permissions: "-rwxr-xr-x"
    uid: 1000
    gid: 1000
  - name: Read-only MCP entrypoint
    path: /opt/whatsapp-mcp/readonly_main.py
    shouldExist: true
    permissions: "-rw-r--r--"
    uid: 1000
    gid: 1000
  - name: WhatsApp message search module
    path: /opt/whatsapp-mcp/message_search.py
    shouldExist: true
    permissions: "-rw-r--r--"
    uid: 1000
    gid: 1000
  - name: Shared entrypoint environment
    path: /opt/whatsapp-mcp/common-env.sh
    shouldExist: true
    permissions: "-rw-r--r--"
    uid: 1000
    gid: 1000
  - name: Combined compatibility entrypoint
    path: /opt/whatsapp-mcp/entrypoint.sh
    shouldExist: true
    permissions: "-rwxr-xr-x"
    uid: 1000
    gid: 1000
  - name: Bridge entrypoint
    path: /opt/whatsapp-mcp/bridge-entrypoint.sh
    shouldExist: true
    permissions: "-rwxr-xr-x"
    uid: 1000
    gid: 1000
  - name: MCP entrypoint
    path: /opt/whatsapp-mcp/mcp-entrypoint.sh
    shouldExist: true
    permissions: "-rwxr-xr-x"
    uid: 1000
    gid: 1000
  - name: Config directory
    path: /config
    shouldExist: true
    permissions: "drwxr-xr-x"
    uid: 1000
    gid: 1000
commandTests:
  - name: Bridge help
    command: /opt/whatsapp-mcp/whatsapp-bridge/whatsapp-bridge
    args: ["--help"]
    exitCode: 0
  - name: Python dependencies import
    command: python
    args:
      - -c
      - import mcp, httpx, requests, sqlite3
    exitCode: 0
  - name: Read-only wrapper omits send tools
    command: python
    args:
      - -c
      - "from pathlib import Path; s=Path('/opt/whatsapp-mcp/readonly_main.py').read_text(); assert 'def send_message' not in s; assert 'def send_file' not in s; assert 'def send_audio_message' not in s; assert 'def download_media' in s; assert 'def search_messages' in s"
    exitCode: 0
  - name: Message search unit tests
    command: python
    args:
      - /opt/whatsapp-mcp/test_message_search.py
    exitCode: 0
  - name: Combined compatibility entrypoint delegates split processes
    command: python
    args:
      - -c
      - "from pathlib import Path; s=Path('/opt/whatsapp-mcp/entrypoint.sh').read_text(); legacy='whatsapp-bridge\" \"'+chr(36)+'@\" >&2 &'; assert '/opt/whatsapp-mcp/bridge-entrypoint.sh' in s; assert '/opt/whatsapp-mcp/mcp-entrypoint.sh' in s; assert legacy not in s"
    exitCode: 0
  - name: MCP entrypoint owns foreground stdio
    command: python
    args:
      - -c
      - "from pathlib import Path; s=Path('/opt/whatsapp-mcp/mcp-entrypoint.sh').read_text(); assert 'python /opt/whatsapp-mcp/readonly_main.py' in s; assert 'exec python' in s; assert 'whatsapp-bridge' not in s"
    exitCode: 0
  - name: Bridge entrypoint owns foreground bridge
    command: python
    args:
      - -c
      - "from pathlib import Path; s=Path('/opt/whatsapp-mcp/bridge-entrypoint.sh').read_text(); expected='exec \"'+chr(36)+'{BRIDGE_DIR}/whatsapp-bridge\" \"'+chr(36)+'@\"'; assert expected in s; assert 'readonly_main.py' not in s"
    exitCode: 0
