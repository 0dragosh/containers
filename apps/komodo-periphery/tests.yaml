---
# yaml-language-server: $schema=https://raw.githubusercontent.com/GoogleContainerTools/container-structure-test/master/schema.json
schemaVersion: "2.0.0"
fileExistenceTests:
  - name: 1Password CLI
    path: /usr/local/bin/op
    shouldExist: true
    permissions: "-rwxr-xr-x"
    uid: 2000
    gid: 2000
  - name: fnox
    path: /usr/local/bin/fnox
    shouldExist: true
    permissions: "-rwxr-xr-x"
    uid: 2000
    gid: 2000
commandTests:
  - name: op version
    command: op
    args: ["--version"]
    exitCode: 0
